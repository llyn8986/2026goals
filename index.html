<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="精進計畫">
<meta name="theme-color" content="#f5ede8">
<title>2026 六個月精進計畫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  /* ── 溫柔豆沙 × 摩卡黑 配色系統 ── */
  --bg: #f5ede8;           /* 最淺粉底 */
  --surface: #fdf8f6;      /* 卡片白底帶粉 */
  --surface2: #ede2db;     /* 輸入框/次要背景 */
  --surface3: #e2d2c8;     /* hover/active */

  --mocha: #6F5B52;        /* 摩卡黑 — 主深色 */
  --mocha-light: #e8ddd8;  /* 摩卡淺 */
  --bean: #D9BAB8;         /* 溫柔豆沙 — 主粉色 */
  --bean-dark: #a07a78;    /* 豆沙深 */
  --bean-light: #f4e8e7;   /* 豆沙淺底 */

  --border: rgba(111,91,82,0.1);
  --border2: rgba(111,91,82,0.22);

  --text: #3a2e2a;
  --text2: #7a6660;
  --text3: #b09a94;

  /* 各目標色 — 全部換成粉咖系 */
  --c1:  #8B6F6A; --c1l: #f0dedd; --c1dk: #4a2e2b;  /* 深豆沙 */
  --c3:  #A07878; --c3l: #f5e4e4; --c3dk: #5a2f2f;  /* 玫瑰棕 */
  --c4:  #B08060; --c4l: #f5e8d8; --c4dk: #5a3a1a;  /* 焦糖 */
  --c5:  #9A7060; --c5l: #f2e2da; --c5dk: #4a2a1e;  /* 肉桂 */
  --c6:  #7A6880; --c6l: #ece4f0; --c6dk: #3a2848;  /* 薰衣紫 */
  --c7:  #6F5B52; --c7l: #e8ddd8; --c7dk: #2e2018;  /* 摩卡 */
  --c8:  #C49090; --c8l: #faeaea; --c8dk: #6a3030;  /* 淡玫瑰 */
  --c10: #B07880; --c10l: #f5e0e4; --c10dk: #5a2830; /* 莓紅 */
  --c11: #807868; --c11l: #eceae4; --c11dk: #3a3020; /* 橄欖棕 */

  --accent: var(--mocha);
  --radius: 12px;
  --radius-sm: 7px;
  --tabbar-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overscroll-behavior: none; overflow-x: hidden; max-width: 100vw; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

/* ── App shell ── */
.app { display: flex; flex-direction: column; height: 100dvh; width: 100%; overflow: hidden; }
.page {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  display: none;
  padding-bottom: calc(var(--tabbar-h) + var(--safe-bottom) + 1.5rem);
}
.page.active { display: block; }
.page-inner { max-width: 520px; margin: 0 auto; padding: 1.25rem 0.875rem 0; }

/* ── Tab bar ── */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--tabbar-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(245,237,232,0.94);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-top: 0.5px solid var(--border2);
  display: flex; align-items: flex-start; justify-content: center;
  z-index: 200;
}
.tab-btn {
  flex: 1; max-width: 160px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; padding-top: 10px;
  cursor: pointer; background: none; border: none;
  color: var(--text3); font-family: 'Noto Sans TC', sans-serif;
  font-size: 10px; font-weight: 400; transition: color 0.2s; user-select: none;
}
.tab-btn.active { color: var(--mocha); font-weight: 600; }
.tab-icon { font-size: 22px; line-height: 1; transition: transform 0.15s; }
.tab-btn:active .tab-icon { transform: scale(0.88); }

/* ── Page header ── */
.page-header {
  margin-bottom: 1.25rem; padding-bottom: 1rem;
  border-bottom: 1px solid var(--border2);
}
.header-title { font-size: 22px; font-weight: 700; letter-spacing: -0.4px; line-height: 1.2; color: var(--mocha); }
.header-sub { font-size: 11px; color: var(--text2); margin-top: 4px; font-family: 'DM Mono', monospace; }

/* ── Stats ── */
.stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 1.5rem; }
.stat-card {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 0.875rem 0.5rem; text-align: center;
  box-shadow: 0 1px 6px rgba(111,91,82,0.07);
}
.stat-val { font-size: 24px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1; color: var(--mocha); }
.stat-label { font-size: 10px; color: var(--text3); margin-top: 4px; }

/* ── Category label ── */
.cat-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--bean-dark);
  margin: 1.25rem 0 0.4rem;
}

/* ── Goal card ── */
.goal-card {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 0.875rem 1rem;
  margin-bottom: 0.5rem; box-shadow: 0 1px 6px rgba(111,91,82,0.06);
}
.goal-header { display: flex; align-items: flex-start; gap: 9px; margin-bottom: 5px; }
.goal-num { font-size: 10.5px; font-weight: 700; color: var(--bean-dark); min-width: 20px; padding-top: 2px; font-family: 'DM Mono', monospace; }
.goal-title { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; line-height: 1.5; }
.goal-metric { font-size: 10.5px; color: var(--text2); padding-left: 29px; margin-bottom: 8px; line-height: 1.75; }

.progress-row { display: flex; align-items: center; gap: 8px; padding-left: 29px; margin-bottom: 7px; }
.bar-bg { flex: 1; height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
.pct-text { font-size: 10.5px; font-weight: 500; color: var(--text3); min-width: 28px; text-align: right; font-family: 'DM Mono', monospace; }

/* ── Cells ── */
.cell-grid { display: grid; gap: 5px; padding-left: 29px; margin-bottom: 9px; }
.cell {
  font-size: 10px; color: var(--text3); text-align: center;
  padding: 0; border-radius: var(--radius-sm);
  border: 0.5px solid var(--border);
  cursor: pointer; user-select: none; line-height: 1.3;
  transition: background 0.13s, transform 0.12s;
  min-height: 44px; /* iOS HIG minimum touch target */
  display: flex; align-items: center; justify-content: center;
}
.cell:active { transform: scale(0.90); }
/* 各色 on 狀態 */
.cell.on-c1  { background: var(--c1l);  color: var(--c1dk);  border-color: var(--c1);  font-weight: 500; }
.cell.on-c3  { background: var(--c3l);  color: var(--c3dk);  border-color: var(--c3);  font-weight: 500; }
.cell.on-c4  { background: var(--c4l);  color: var(--c4dk);  border-color: var(--c4);  font-weight: 500; }
.cell.on-c5  { background: var(--c5l);  color: var(--c5dk);  border-color: var(--c5);  font-weight: 500; }
.cell.on-c6  { background: var(--c6l);  color: var(--c6dk);  border-color: var(--c6);  font-weight: 500; }
.cell.on-c7  { background: var(--c7l);  color: var(--c7dk);  border-color: var(--c7);  font-weight: 500; }
.cell.on-c8  { background: var(--c8l);  color: var(--c8dk);  border-color: var(--c8);  font-weight: 500; }
.cell.on-c10 { background: var(--c10l); color: var(--c10dk); border-color: var(--c10); font-weight: 500; }
.cell.on-c11 { background: var(--c11l); color: var(--c11dk); border-color: var(--c11); font-weight: 500; }

/* ── Extra fields ── */
.extra-field { padding-left: 29px; margin-bottom: 9px; }
.extra-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.extra-input {
  width: 100%; background: var(--surface2); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 7px 10px;
  font-size: 12px; font-family: 'Noto Sans TC', sans-serif;
  color: var(--text); line-height: 1.6; outline: none; resize: vertical;
  min-height: 36px; max-height: 100px; transition: border-color 0.2s;
}
.extra-input:focus { border-color: var(--border2); background: var(--surface); }
.extra-input::placeholder { color: var(--text3); font-size: 11px; }

/* ── Notes ── */
.notes-wrapper { padding-left: 29px; }
.notes-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.notes-input {
  width: 100%; min-height: 36px; max-height: 110px; resize: vertical;
  background: var(--surface2); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 7px 10px;
  font-size: 12px; font-family: 'Noto Sans TC', sans-serif;
  color: var(--text); line-height: 1.6; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.notes-input::placeholder { color: var(--text3); font-size: 11px; }
.notes-input:focus { border-color: var(--border2); background: var(--surface); }

/* ══ CALENDAR ══ */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.cal-month-label { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: var(--mocha); }
.cal-nav {
  background: var(--surface); border: 0.5px solid var(--border2);
  border-radius: 8px; width: 44px; height: 44px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; color: var(--text2); transition: background 0.15s;
}
.cal-nav:active { background: var(--surface2); transform: scale(0.9); }

.cal-grid {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  box-shadow: 0 1px 6px rgba(111,91,82,0.06); margin-bottom: 1rem;
}
.cal-weekdays {
  display: grid; grid-template-columns: repeat(7,1fr);
  background: var(--bean-light); border-bottom: 0.5px solid var(--border);
}
.cal-wd { text-align: center; font-size: 10px; font-weight: 600; color: var(--bean-dark); padding: 8px 0; letter-spacing: 0.05em; }
.cal-days { display: grid; grid-template-columns: repeat(7,1fr); grid-auto-rows: auto; }
.cal-day {
  position: relative;
  min-height: 52px;
  padding: 7px 2px 5px;
  border-right: 0.5px solid var(--border);
  border-bottom: 0.5px solid var(--border);
  cursor: pointer; transition: background 0.13s;
  display: flex; flex-direction: column; align-items: center;
  /* Each cell independent — grid-auto-rows:auto means rows size to tallest in that row */
  box-sizing: border-box;
}
.cal-day:nth-child(7n) { border-right: none; }
.cal-day:nth-last-child(-n+7) { border-bottom: none; }
.cal-day.empty { cursor: default; background: transparent; }
.cal-day.today .cal-day-num {
  background: var(--mocha); color: #fff;
  border-radius: 50%; width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.cal-day.selected { background: var(--bean-light); }
.cal-day:not(.empty):active { background: var(--surface2); }
.cal-day-num { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1; margin-bottom: 3px; }
.cal-day.empty .cal-day-num { color: transparent; }
.dot-row { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; margin-top: auto; padding-bottom: 2px; }
.dot { width: 5px; height: 5px; border-radius: 50%; }

/* ── Day panel ── */
.day-panel {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius); padding: 1rem;
  box-shadow: 0 1px 8px rgba(111,91,82,0.07); margin-bottom: 1rem;
}
.day-panel-header {
  font-size: 14px; font-weight: 600; margin-bottom: 0.875rem;
  padding-bottom: 0.625rem; border-bottom: 0.5px solid var(--border);
  color: var(--mocha);
}
.day-journal-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.day-journal {
  width: 100%; min-height: 70px; max-height: 140px; resize: vertical;
  background: var(--surface2); border: 0.5px solid var(--border);
  border-radius: var(--radius-sm); padding: 8px 10px;
  font-size: 12.5px; font-family: 'Noto Sans TC', sans-serif;
  color: var(--text); line-height: 1.7; outline: none;
  transition: border-color 0.2s; margin-bottom: 1rem;
}
.day-journal:focus { border-color: var(--border2); background: var(--surface); }
.day-journal::placeholder { color: var(--text3); font-size: 11.5px; }
.day-goals-label { font-size: 10px; color: var(--text3); margin-bottom: 8px; letter-spacing: 0.03em; }
.day-goal-list { display: flex; flex-direction: column; gap: 8px; }
.day-goal-item {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 0.5px solid var(--border);
  transition: border-color 0.15s;
}
.day-goal-item.checked { border-color: var(--bean-dark); background: var(--bean-light); }
.day-goal-top {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; min-height: 44px;
  cursor: pointer; user-select: none;
}
.day-goal-top:active { opacity: 0.75; }
.day-goal-check {
  width: 22px; height: 22px; border-radius: 6px;
  border: 1.5px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 13px;
  transition: background 0.15s, border-color 0.15s;
}
.day-goal-item.checked .day-goal-check { background: var(--mocha); border-color: var(--mocha); color: #fff; }
.day-goal-name { font-size: 12.5px; color: var(--text); flex: 1; line-height: 1.4; font-weight: 500; }
.day-goal-input-row { padding: 0 12px 10px; display: none; }
.day-goal-item.checked .day-goal-input-row { display: block; }
.day-goal-input {
  width: 100%; background: var(--surface); border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm); padding: 7px 10px;
  font-size: 12px; font-family: 'Noto Sans TC', sans-serif;
  color: var(--text); line-height: 1.6; outline: none;
  transition: border-color 0.2s;
}
.day-goal-input:focus { border-color: var(--mocha); }
.day-goal-input::placeholder { color: var(--text3); }
.day-goal-divider {
  border: none; border-top: 1px dashed var(--border2);
  margin: 8px 0;
}
.day-goal-fixed-tag {
  display: inline-block;
  background: var(--mocha-light); color: var(--mocha);
  font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 99px;
  border: 1px solid var(--border2);
  letter-spacing: 0.03em;
}
.day-goal-sub-label {
  font-size: 10px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.03em;
}
.cal-day-tags { display: flex; flex-direction: column; gap: 2px; width: 100%; margin-top: 2px; }
.cal-tag {
  font-size: 7.5px; line-height: 1.3; padding: 2px 3px; border-radius: 3px;
  font-weight: 500; width: 100%;
  white-space: pre-wrap;
  word-break: break-all;
  text-align: center;
  display: block;
}

/* ── Toast ── */
.save-toast {
  position: fixed; bottom: calc(var(--tabbar-h) + var(--safe-bottom) + 12px); right: 14px;
  background: var(--mocha); color: #fdf8f6;
  font-size: 11px; font-family: 'DM Mono', monospace;
  padding: 6px 14px; border-radius: 99px;
  opacity: 0; transition: opacity 0.25s;
  pointer-events: none; z-index: 300;
}
.save-toast.show { opacity: 1; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 99px; }

/* ── Auto-stat blocks in tracker cards ── */
.auto-stat-block {
  margin: 6px 0 0 29px;
  padding: 8px 12px;
  background: var(--bean-light);
  border: 0.5px solid var(--bean-dark);
  border-radius: var(--radius-sm);
  font-size: 11px; color: var(--mocha); line-height: 1.7;
}
.auto-stat-title { font-weight: 600; font-size: 10px; color: var(--bean-dark); margin-bottom: 4px; letter-spacing: 0.04em; }
.auto-stat-row { display: flex; justify-content: space-between; align-items: center; }
.auto-stat-val { font-family: 'DM Mono', monospace; font-weight: 600; font-size: 13px; }
.auto-stat-list { font-size: 10.5px; color: var(--text2); margin-top: 4px; line-height: 1.8; }
.auto-stat-month { display: flex; align-items: center; gap: 6px; padding: 3px 0; border-bottom: 0.5px dashed var(--border); }
.auto-stat-month:last-child { border-bottom: none; }
.auto-stat-km { font-family: 'DM Mono', monospace; font-weight: 600; color: var(--mocha); min-width: 52px; }
.auto-stat-bar-wrap { flex:1; height: 4px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
.auto-stat-bar { height: 100%; border-radius: 99px; background: var(--c1); transition: width 0.4s; }
</style>
</head>
<body>
<div class="app">

  <!-- TRACKER -->
  <div class="page active" id="page-tracker">
    <div class="page-inner">
      <div class="page-header">
        <div class="header-title">2026 精進計畫</div>
        <div class="header-sub">JUN — NOV 2025 ｜ 十大目標追蹤</div>
      </div>
      <div class="stats-row" id="stats"></div>
      <div id="tracker"></div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="page" id="page-calendar">
    <div class="page-inner">
      <div class="cal-header">
        <button class="cal-nav" onclick="calPrev()">‹</button>
        <div class="cal-month-label" id="calMonthLabel"></div>
        <button class="cal-nav" onclick="calNext()">›</button>
      </div>
      <div class="cal-grid">
        <div class="cal-weekdays">
          <div class="cal-wd">日</div><div class="cal-wd">一</div>
          <div class="cal-wd">二</div><div class="cal-wd">三</div>
          <div class="cal-wd">四</div><div class="cal-wd">五</div>
          <div class="cal-wd">六</div>
        </div>
        <div class="cal-days" id="calDays"></div>
      </div>
      <div id="dayPanel"></div>
    </div>
  </div>

  <!-- TABBAR -->
  <nav class="tabbar">
    <button class="tab-btn active" id="tab-tracker" onclick="switchTab('tracker')">
      <span class="tab-icon">📋</span><span>目標追蹤</span>
    </button>
    <button class="tab-btn" id="tab-calendar" onclick="switchTab('calendar')">
      <span class="tab-icon">📅</span><span>每日日曆</span>
    </button>
  </nav>
</div>

<div class="save-toast" id="saveToast">已自動儲存 ✓</div>

<script>
const STORAGE_KEY = 'goals_2026_v1';
const MONTHS = ["6月","7月","8月","9月","10月","11月"];

const goals = [
  {
    cat: "身心狀態",
    items: [
      { id:1, color:"c1",
        title:"持續慢跑｜每月 ≥ 58km，年底5K配速 ≤ 6:45，完成一場10K",
        metric:"每月底記錄累計里程 ｜ 每月計時一次5K ｜ 報名並完成10K路跑",
        cells: MONTHS }
    ]
  },
  {
    cat: "知識與閱讀",
    items: [
      { id:3, color:"c3",
        title:"閱讀並練習描述心得感想，每月 ≥ 2 本，記錄於 Goodnotes",
        metric:"每本讀完後手寫心得 ｜ 6個月累積 ≥ 12本 ｜ 練習口語描述書中重點",
        cells: MONTHS,
        extraField: { key:'books', label:'登記閱讀書名', placeholder:'例：原子習慣、被討厭的勇氣…' } },
      { id:4, color:"c4",
        title:"收聽財經皓角（週一至五 8:30）＋ 股癌（週三、六）做筆記，每週認識 2 檔股票公司",
        metric:"每週完整收聽場次 ｜ 每月整理一份重點筆記 ｜ 累積認識股票公司",
        cells: MONTHS,
        extraField: { key:'stocks', label:'本週研究的股票公司', placeholder:'例：台積電 2330、聯發科 2454…' } }
    ]
  },
  {
    cat: "專業知識",
    items: [
      { id:5, color:"c5",
        title:"複習稅務課程：重聽錄音檔 ＋ 寫筆記（8/1前完成）",
        metric:"課程章節逐一完成 ｜ 8月1日前全部聽完並寫好筆記",
        cells:["6月進度","7月完成","✓ 截止8/1"] },

// ── STATE ──
function buildDefaultState() {
  const s = { goals:{}, calendar:{} };
  allGoalItems.forEach(item => {
    s.goals[item.id] = { cells:{}, note:'', extra:'' };
    item.cells.forEach(c => s.goals[item.id].cells[c] = false);
  });
  return s;
}
function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); if(r) return JSON.parse(r); } catch(e){}
  return null;
}
let state = loadState() || buildDefaultState();
if(!state.goals) state.goals={};
if(!state.calendar) state.calendar={};
allGoalItems.forEach(item => {
  if(!state.goals[item.id]) state.goals[item.id]={cells:{},note:'',extra:''};
  if(!state.goals[item.id].cells) state.goals[item.id].cells={};
  if(!state.goals[item.id].extra) state.goals[item.id].extra='';
  item.cells.forEach(c => { if(state.goals[item.id].cells[c]===undefined) state.goals[item.id].cells[c]=false; });
});

let saveTimer=null;
function save() {
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{
      localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
      showToast();
      // Refresh auto-stat blocks in tracker if visible
      if(document.getElementById('page-tracker').classList.contains('active')) refreshAutoStats();
    }catch(e){}
  },350);
}
let toastTimer=null;
function showToast() {
  const el=document.getElementById('saveToast');
  el.classList.add('show'); clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),1800);
}

function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if(tab==='calendar') renderCalendar();
  if(tab==='tracker') refreshAutoStats();
}

// Refresh auto-stat blocks when switching to tracker tab
function refreshAutoStats() {
  [1, 4, 5].forEach(id => {
    const card = document.getElementById('card-'+id);
    if (!card) return;

// ── TRACKER ──
function toggle(id, cell) {
  state.goals[id].cells[cell]=!state.goals[id].cells[cell];
  save(); updateCard(id); renderStats();
}
function updateNote(id) {
  const el=document.getElementById('note-'+id); if(el) state.goals[id].note=el.value; save();
}
function updateExtra(id) {
  const el=document.getElementById('extra-'+id); if(el) state.goals[id].extra=el.value; save();
}
function pct(item) {
  const vals=Object.values(state.goals[item.id].cells);
  return vals.length ? Math.round(vals.filter(Boolean).length/vals.length*100) : 0;
}
function totalDone() {
  let done=0, total=0;
  allGoalItems.forEach(item=>{ const v=Object.values(state.goals[item.id].cells); done+=v.filter(Boolean).length; total+=v.length; });
  return {done,total};
}
// ── Derived stats from calendar data ──

function calcRunStats() {
  const monthKm = {};
  const MMAP = {"06":"6月","07":"7月","08":"8月","09":"9月","10":"10月","11":"11月"};
  Object.entries(state.calendar).forEach(([key, dayData]) => {
    if (!dayData.goals || !dayData.goals[1]) return;
    const ml = MMAP[key.slice(5,7)]; if(!ml) return;
    const detail = dayData.details && dayData.details[1];
    if (!detail) return;
    const num = parseFloat(String(detail).replace(/[^0-9.]/g,''));
    if (!isNaN(num)) monthKm[ml] = (monthKm[ml]||0) + num;
  });
  return monthKm;
}

function calcStockStats() {
  const monthStocks = {};
  const allStocks = [];
  const MMAP = {"06":"6月","07":"7月","08":"8月","09":"9月","10":"10月","11":"11月"};
  Object.entries(state.calendar).forEach(([key, dayData]) => {
    if (!dayData.goals || !dayData.goals[4]) return;
    const ml = MMAP[key.slice(5,7)]; if(!ml) return;
    const d4 = dayData.details && dayData.details[4];
    const stock = d4 && d4.stock && String(d4.stock).trim();
    if (stock) {
      if (!monthStocks[ml]) monthStocks[ml] = new Set();
      stock.split(/[,、，]+/).forEach(s => {
        const t = s.trim(); if(t) { monthStocks[ml].add(t); allStocks.push(t); }
      });
    }
  });
  return { monthStocks, uniqueAll: [...new Set(allStocks)] };
}

function calcTaxEntries() {
  const entries = [];
  Object.keys(state.calendar).sort().forEach(key => {
    const dayData = state.calendar[key];
    if (!dayData.goals || !dayData.goals[5]) return;
    const detail = dayData.details && dayData.details[5];
    if (!detail || !String(detail).trim()) return;
    const [,m,d] = key.split('-');
    entries.push({ date: parseInt(m)+'/'+parseInt(d), name: String(detail).trim() });
  });
  return entries;
}

function buildRunAutoStat() {
  const monthKm = calcRunStats();
  const TARGET = 58;
  const rows = MONTHS.map(m => {
    const km = monthKm[m] || 0;
    const pBar = Math.min(100, Math.round(km/TARGET*100));
    const done = km >= TARGET;
    const kmStr = km > 0 ? km.toFixed(1)+'km' : '—';
    const pStr = done ? '✓' : pBar+'%';
    return '<div class="auto-stat-month">'
      + '<span style="font-size:10px;color:var(--text3);min-width:28px">'+m+'</span>'
      + '<span class="auto-stat-km">'+kmStr+'</span>'
      + '<div class="auto-stat-bar-wrap"><div class="auto-stat-bar" style="width:'+pBar+'%;background:'+(done?'var(--c1)':'var(--bean)')+'"></div></div>'
      + '<span style="font-size:10px;min-width:20px;text-align:right">'+pStr+'</span>'
      + '</div>';
  }).join('');
  return '<div class="auto-stat-block" id="autostat-1">'
    + '<div class="auto-stat-title">📊 日曆累計里程（目標：每月58km）</div>'
    + rows + '</div>';
}

function buildStockAutoStat() {
  const { monthStocks, uniqueAll } = calcStockStats();
  const TARGET_M = 8;
  // auto-sync to extra textarea
  if (uniqueAll.length) state.goals[4].extra = uniqueAll.join('、');
  const monthRows = MONTHS.map(m => {
    const cnt = (monthStocks[m] || new Set()).size;
    const pBar = Math.min(100, Math.round(cnt/TARGET_M*100));
    return '<div class="auto-stat-month">'
      + '<span style="font-size:10px;color:var(--text3);min-width:28px">'+m+'</span>'
      + '<span class="auto-stat-km">'+cnt+' 檔</span>'
      + '<div class="auto-stat-bar-wrap"><div class="auto-stat-bar" style="width:'+pBar+'%;background:var(--c4)"></div></div>'
      + '<span style="font-size:10px;min-width:28px;text-align:right">'+(cnt>=TARGET_M?'✓':cnt+'/'+TARGET_M)+'</span>'
      + '</div>';
  }).join('');
  const chips = uniqueAll.length
    ? uniqueAll.map(s=>'<span style="display:inline-block;background:var(--c4l);color:var(--c4dk);padding:2px 7px;border-radius:99px;font-size:10px;margin:2px 2px 0 0">'+s+'</span>').join('')
    : '<span style="color:var(--text3);font-size:10px">尚無紀錄</span>';
  return '<div class="auto-stat-block" id="autostat-4">'
    + '<div class="auto-stat-title">📈 股票認識統計（目標：每月≥8檔）</div>'
    + monthRows
    + '<div style="margin-top:8px;font-size:10px;color:var(--text3);margin-bottom:4px">累計認識（'+uniqueAll.length+' 檔）：</div>'
    + '<div>'+chips+'</div></div>';
}

function buildTaxAutoStat() {
  const entries = calcTaxEntries();
  const rows = entries.length
    ? entries.map(e=>'<div style="display:flex;gap:8px;font-size:10.5px;padding:2px 0">'
        + '<span style="color:var(--text3);min-width:36px">'+e.date+'</span>'
        + '<span>'+e.name+'</span></div>').join('')
    : '<span style="color:var(--text3);font-size:10px">尚無紀錄</span>';
  return '<div class="auto-stat-block" id="autostat-5">'
    + '<div class="auto-stat-title">📚 課程紀錄（共4堂，8/1前完成）</div>'
    + rows + '</div>';
}

function cardHTML(item) {
  const p=pct(item);
  const cols=item.gridCols||(item.cells.length<=4?item.cells.length:6);
  const cellsHTML=item.cells.map(c=>{
    const on=state.goals[item.id].cells[c];
    return '<div class="cell'+(on?' on-'+item.color:'')+'" onclick="toggle('+item.id+',\''+c.replace(/'/g,"\\'")+'\')">&nbsp;'+c+'</div>';
  }).join('');

  let autoStatHTML = '';
  if (item.id === 1) autoStatHTML = buildRunAutoStat();
  if (item.id === 4) autoStatHTML = buildStockAutoStat();

  const extraHTML=item.extraField?

    + '<div class="extra-label">'+item.extraField.label+'</div>'
    + '<textarea class="extra-input" id="extra-'+item.id+'" placeholder="'+item.extraField.placeholder+'" oninput="updateExtra('+item.id+')">'+(state.goals[item.id].extra||'')+'</textarea>'
    + '</div>':'';

  return '<div class="goal-card" id="card-'+item.id+'">'
    + '<div class="goal-header">'
    + '<span class="goal-num">'+String(item.id).padStart(2,'0')+'</span>'
    + '<span class="goal-title">'+item.title+'</span>'
    + '</div>'
    + '<div class="goal-metric">'+item.metric+'</div>'

    + '<div class="bar-bg"><div class="bar-fill" id="bar-'+item.id+'" style="width:'+p+'%;background:var(--'+item.color+');"></div></div>'
    + '<span class="pct-text" id="pct-'+item.id+'">'+p+'%</span>'
    + '</div>'
    + '<div class="cell-grid" style="grid-template-columns:repeat('+cols+',1fr)" id="cells-'+item.id+'">'+cellsHTML+'</div>'
    + autoStatHTML
    + extraHTML
    + '<div class="notes-wrapper">'
    + '<div class="notes-label">備註</div>'
    + '<textarea class="notes-input" id="note-'+item.id+'" placeholder="補充說明、心得、提醒…" oninput="updateNote('+item.id+')">'+(state.goals[item.id].note||'')+'</textarea>'
    + '</div></div>';

function updateCard(id) {
  const item=allGoalItems.find(i=>i.id===id); if(!item) return;
  const p=pct(item);
  const barEl=document.getElementById('bar-'+id);
  const pctEl=document.getElementById('pct-'+id);
  const cellsEl=document.getElementById('cells-'+id);
  if(barEl) barEl.style.width=p+'%';

    const cols=item.gridCols||(item.cells.length<=4?item.cells.length:6);
    cellsEl.style.gridTemplateColumns=`repeat(${cols},1fr)`;
    cellsEl.innerHTML=item.cells.map(c=>{
      const on=state.goals[id].cells[c];
      return `<div class="cell${on?' on-'+item.color:''}" onclick="toggle(${id},'${c.replace(/'/g,"\\'")}')"> ${c}</div>`;
    }).join('');
  }
}

// ── CALENDAR ──
const today=new Date();
let calYear=today.getFullYear(), calMonth=today.getMonth();
let selectedDate=null;
const TW_MONTHS=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

// Goal IDs that need a text input when checked
// id:1 run km, id:3 book name, id:4 finance note/stock, id:5 tax course name
const DETAIL_GOALS = {
  1:  { placeholder: '今天跑了幾公里？例：5.2km', tagPrefix: '🏃' },
  3:  { placeholder: '輸入書名，例：原子習慣', tagPrefix: '📖' },
  4:  { fields: [
          { key:'podcast', label:'今日收聽', placeholder: '例：財經皓角筆記 / 股癌筆記' },
          { key:'stock',   label:'認識股票', placeholder: '例：台積電 2330' }
        ]},
  5:  { placeholder: '登記課程名稱，例：贈與稅實務', tagPrefix: '📚' },
  8:  { placeholder: '醫療 / 儲蓄 / 投資 / 房貸' },
  // fixed tag goals — no user input needed
  6:  { fixedTag: 'AI房貸工具' },
  7:  { fixedTag: 'AI健診系統' },
  10: { fixedTag: '存200元' },
  11: { fixedTag: 'AI房貸工具' }
};

function dateKey(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function getDayData(key){
  if(!state.calendar[key]) state.calendar[key]={journal:'',goals:{},details:{}};
  if(!state.calendar[key].details) state.calendar[key].details={};
  return state.calendar[key];
}
function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

// Build short tag text for a goal to show on calendar cell
function buildTag(item, data) {
  const dg = DETAIL_GOALS[item.id];
  // Fixed tag goals
  if (dg && dg.fixedTag) return dg.fixedTag;
  // id:4 multi-field
  if (item.id === 4) {
    const d = data.details && data.details[4];
    const podcast = d && d.podcast && d.podcast.trim();
    const stock   = d && d.stock   && d.stock.trim();
    const parts = [];
    if (podcast) { let t=podcast; if(t.length>7) t=t.slice(0,6)+'…'; parts.push('📝'+t); }
    if (stock)   { let t=stock;   if(t.length>7) t=t.slice(0,6)+'…'; parts.push('📈'+t); }
    return parts.length ? parts.join('\n') : '財經';
  }
  // Goals with free text input
  const detail = data.details && data.details[item.id];
  if (detail && detail.trim()) {
    let txt = detail.trim();
    if (item.id === 1) {
      const num = txt.replace(/[^0-9.]/g,'');
      txt = num ? '跑' + num + 'km' : txt;
    }
    if (txt.length > 8) txt = txt.slice(0,7) + '…';
    return txt;
  }
  const titles = {1:'慢跑',3:'閱讀',4:'財經',5:'稅務',6:'房貸',7:'保單',8:'手冊',10:'存錢',11:'工具'};
  // id:8 handbook — append 手冊 suffix
  if (item.id === 8 && detail && detail.trim()) {
    let txt = detail.trim();
    if (txt.length > 4) txt = txt.slice(0,4);
    return txt + '手冊';
  }
  return titles[item.id] || item.title.slice(0,4);
}

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent=`${calYear} 年 ${TW_MONTHS[calMonth]}`;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  let html='';
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day empty"><span class="cal-day-num">0</span></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const key=dateKey(calYear,calMonth,d);
    const isToday=(calYear===today.getFullYear()&&calMonth===today.getMonth()&&d===today.getDate());
    const isSel=key===selectedDate;
    const dayData=state.calendar[key];
    let innerHTML='';
    if(dayData&&dayData.goals){
      const checkedItems=allGoalItems.filter(item=>dayData.goals[item.id]);
      if(checkedItems.length){
        let tagsHTML = '<div class="cal-day-tags">';
        checkedItems.forEach(item=>{
          const txt = buildTag(item, dayData);
          const hex = colorHex[item.color];
          tagsHTML += `<div class="cal-tag" style="background:${hex}22;color:${hex};border:0.5px solid ${hex}55">${txt}</div>`;
        });
        tagsHTML += '</div>';
        innerHTML = tagsHTML;
      }
    }
    html+=`<div class="cal-day${isToday?' today':''}${isSel?' selected':''}" onclick="selectDay('${key}')">
      <span class="cal-day-num">${d}</span>${innerHTML}</div>`;
  }
  document.getElementById('calDays').innerHTML=html;
  renderDayPanel();
}

function selectDay(key){ selectedDate=key; renderCalendar(); }

function renderDayPanel(){
  const panel=document.getElementById('dayPanel');
  if(!selectedDate){ panel.innerHTML=''; return; }
  const [y,m,day]=selectedDate.split('-');
  const label=`${parseInt(y)}年${parseInt(m)}月${parseInt(day)}日`;
  const data=getDayData(selectedDate);

  const goalsHTML=allGoalItems.map(item=>{
    const checked=!!(data.goals&&data.goals[item.id]);
    const dg=DETAIL_GOALS[item.id];
    let inputRow='';
    if(dg && dg.fixedTag) {
      // Fixed label — show a read-only chip, no input
      inputRow=`<div class="day-goal-input-row">
        <div class="day-goal-fixed-tag">${dg.fixedTag}</div>
      </div>`;
    } else if(dg && dg.fields) {
      // multi-field (id:4)
      const d4=(data.details&&data.details[4])||{};
      inputRow='<div class="day-goal-input-row">';
      dg.fields.forEach((f,i)=>{
        const val=(d4[f.key]||'').replace(/"/g,'&quot;');
        if(i>0) inputRow+='<div class="day-goal-divider"></div>';
        inputRow+=`<div class="day-goal-sub-label">${f.label}</div>
          <input class="day-goal-input" type="text"
            placeholder="${f.placeholder}"
            value="${val}"
            oninput="updateDayDetailField('${selectedDate}',4,'${f.key}',this.value)"
          />`;
      });
      inputRow+='</div>';
    } else if(dg && dg.placeholder) {
      const detailVal=(data.details&&data.details[item.id])||'';
      inputRow=`<div class="day-goal-input-row">
        <input class="day-goal-input" type="text"
          placeholder="${dg.placeholder}"
          value="${detailVal.replace(/"/g,'&quot;')}"
          oninput="updateDayDetail('${selectedDate}',${item.id},this.value)"
        />
      </div>`;
    }
    const shortName = item.title.split('｜')[0].trim().split('，')[0].trim();
    return `<div class="day-goal-item${checked?' checked':''}" id="dgi-${item.id}">
      <div class="day-goal-top" onclick="toggleDayGoal('${selectedDate}',${item.id})">
        <div class="day-goal-check">${checked?'✓':''}</div>
        <div class="day-goal-name">${shortName}</div>
      </div>
      ${inputRow}
    </div>`;
  }).join('');

  panel.innerHTML=`<div class="day-panel">
    <div class="day-panel-header">${label} 日誌</div>
    <div class="day-journal-label">今日記錄</div>
    <textarea class="day-journal" placeholder="今天在做什麼？有什麼進展或想法…"
      oninput="updateJournal('${selectedDate}')">${data.journal||''}</textarea>
    <div class="day-goals-label">今日目標進度（點選已推進的項目）</div>
    <div class="day-goal-list">${goalsHTML}</div>
  </div>`;
}

function updateJournal(key){
  const el=document.querySelector('.day-journal'); if(!el) return;
  getDayData(key).journal=el.value; save();
}

function toggleDayGoal(key,goalId){
  const data=getDayData(key);
  if(!data.goals) data.goals={};
  data.goals[goalId]=!data.goals[goalId];
  save();
  // Re-render just the item without full calendar re-render for snappiness
  const el=document.getElementById('dgi-'+goalId);
  if(el){
    el.classList.toggle('checked', !!data.goals[goalId]);
    const chk=el.querySelector('.day-goal-check');
    if(chk) chk.textContent=data.goals[goalId]?'✓':'';
  }
  // Update only the grid, not the panel (keeps input focus)
  renderCalendarGridOnly();
}

let calRefreshTimer=null;
function updateDayDetailField(key,goalId,fieldKey,value){
  const data=getDayData(key);
  if(!data.details) data.details={};
  if(!data.details[goalId]) data.details[goalId]={};
  data.details[goalId][fieldKey]=value;
  save();
  clearTimeout(calRefreshTimer);
  calRefreshTimer=setTimeout(()=>{ renderCalendarGridOnly(); }, 800);
}
function updateDayDetail(key,goalId,value){
  const data=getDayData(key);
  if(!data.details) data.details={};
  data.details[goalId]=value;
  save();
  // Debounce calendar re-render so typing isn't interrupted
  clearTimeout(calRefreshTimer);
  calRefreshTimer=setTimeout(()=>{ renderCalendarGridOnly(); }, 800);
}

// Re-render only the day grid (not the panel) to update tags without disrupting input focus
function renderCalendarGridOnly(){
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  let html='';
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day empty"><span class="cal-day-num">0</span></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const key=dateKey(calYear,calMonth,d);
    const isToday=(calYear===today.getFullYear()&&calMonth===today.getMonth()&&d===today.getDate());
    const isSel=key===selectedDate;
    const dayData=state.calendar[key];
    let innerHTML='';
    if(dayData&&dayData.goals){
      const checkedItems=allGoalItems.filter(item=>dayData.goals[item.id]);
      if(checkedItems.length){
        let tagsHTML='<div class="cal-day-tags">';
        checkedItems.forEach(item=>{
          const txt=buildTag(item,dayData);
          const hex=colorHex[item.color];
          tagsHTML+=`<div class="cal-tag" style="background:${hex}22;color:${hex};border:0.5px solid ${hex}55">${txt}</div>`;
        });
        tagsHTML+='</div>';
        innerHTML=tagsHTML;
      }
    }
    html+=`<div class="cal-day${isToday?' today':''}${isSel?' selected':''}" onclick="selectDay('${key}')">
      <span class="cal-day-num">${d}</span>${innerHTML}</div>`;
  }
  document.getElementById('calDays').innerHTML=html;
}

renderTracker();
